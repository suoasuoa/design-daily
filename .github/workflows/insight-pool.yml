name: Insight Pool

on:
  schedule:
    # Main runs: 07:30, 11:30, and 15:30 Beijing time.
    - cron: "30 23 * * *"
    - cron: "30 3 * * *"
    - cron: "30 7 * * *"
    # Backup checks for the same three phases. They skip if the phase target is already met.
    - cron: "10 0 * * *"
    - cron: "10 4 * * *"
    - cron: "10 8 * * *"
  workflow_dispatch:
    inputs:
      score_limit:
        description: "Maximum products to score this run"
        required: true
        default: "45"
      agent_queries:
        description: "DeepSeek-planned searches per round"
        required: true
        default: "70"
      agent_pages:
        description: "Fresh pages screened per round"
        required: true
        default: "320"
      use_tavily:
        description: "Use Tavily credits for this manual deep run"
        required: true
        default: "false"

permissions:
  contents: write

concurrency:
  group: insight-pool-main
  cancel-in-progress: false

jobs:
  build-insight-pool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set phased daily targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "DAILY_TARGET=30" >> "$GITHUB_ENV"
              echo "SOCIAL_TARGET=0" >> "$GITHUB_ENV"
              echo "SCORE_LIMIT=${{ github.event.inputs.score_limit || '45' }}" >> "$GITHUB_ENV"
              echo "AGENT_QUERIES=${{ github.event.inputs.agent_queries || '70' }}" >> "$GITHUB_ENV"
              echo "AGENT_PAGES=${{ github.event.inputs.agent_pages || '320' }}" >> "$GITHUB_ENV"
              if [ "${{ github.event.inputs.use_tavily || 'false' }}" = "true" ]; then
                echo "USE_TAVILY_SEARCH=1" >> "$GITHUB_ENV"
              else
                echo "USE_TAVILY_SEARCH=0" >> "$GITHUB_ENV"
              fi
          else
              bj_hm="$(TZ=Asia/Shanghai date +%H%M)"
              if [ "$bj_hm" -lt 1100 ]; then
                echo "DAILY_TARGET=10" >> "$GITHUB_ENV"
                echo "SCORE_LIMIT=60" >> "$GITHUB_ENV"
                echo "AGENT_QUERIES=40" >> "$GITHUB_ENV"
                echo "AGENT_PAGES=180" >> "$GITHUB_ENV"
              elif [ "$bj_hm" -lt 1500 ]; then
                echo "DAILY_TARGET=20" >> "$GITHUB_ENV"
                echo "SCORE_LIMIT=80" >> "$GITHUB_ENV"
                echo "AGENT_QUERIES=55" >> "$GITHUB_ENV"
                echo "AGENT_PAGES=240" >> "$GITHUB_ENV"
              else
                echo "DAILY_TARGET=30" >> "$GITHUB_ENV"
                echo "SCORE_LIMIT=45" >> "$GITHUB_ENV"
                echo "AGENT_QUERIES=70" >> "$GITHUB_ENV"
                echo "AGENT_PAGES=320" >> "$GITHUB_ENV"
              fi
              echo "SOCIAL_TARGET=0" >> "$GITHUB_ENV"
              echo "USE_TAVILY_SEARCH=0" >> "$GITHUB_ENV"
              echo "PHASE_CLOCK=$bj_hm" >> "$GITHUB_ENV"
          fi

      - name: Skip completed scheduled phase
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path
          from zoneinfo import ZoneInfo

          target = int(os.environ.get("DAILY_TARGET", "30"))
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          today = dt.datetime.now(ZoneInfo("Asia/Shanghai")).date().isoformat()
          skip = False
          reason = "manual_or_incomplete"

          if event_name == "schedule":
              path = Path("insight/data.raw.json")
              if path.exists():
                  data = json.loads(path.read_text(encoding="utf-8"))
                  group = (data.get("daily_groups") or [{}])[0]
                  actual = int(group.get("actual_count") or len(group.get("items") or []))
                  if group.get("date") == today and actual >= target:
                      skip = True
                      reason = f"today_target_already_met date={today} actual={actual} target={target}"
                  else:
                      reason = f"needs_run date={group.get('date')} actual={actual} target={target} today={today}"
              else:
                  reason = "no_existing_dashboard_data"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"SKIP_INSIGHT={'1' if skip else '0'}\n")
          print(f"skip_insight={skip} reason={reason}")
          PY

      - name: Collect public leads
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/collect_public.py

      - name: Collect curated product pages
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/collect_curated_pages.py --limit 90 --shopify-pages 1

      - name: Generate search job matrix
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/search_jobs.py

      - name: Install free search backend
        if: env.SKIP_INSIGHT != '1'
        run: python3 -m pip install -q ddgs

      - name: Run DeepSeek search agent
        if: env.SKIP_INSIGHT != '1'
        timeout-minutes: 90
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: >-
          python3 scripts/deepseek_search_agent.py
          --target "$DAILY_TARGET"
          --round 0
          --query-count "$AGENT_QUERIES"
          --per-query 10
          --max-pages "$AGENT_PAGES"
          --search-workers 10
          --page-workers 12
          --screen-workers 6

      - name: Dedupe product pool
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/dedupe.py

      - name: Review category fit
        if: env.SKIP_INSIGHT != '1'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          CATEGORY_REVIEW_WORKERS: "4"
        run: python3 scripts/review_categories.py --batch-size 10

      - name: Ensure phased public social picks
        if: env.SKIP_INSIGHT != '1'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python3 scripts/ensure_daily_social_minimum.py --target "$SOCIAL_TARGET" --batch-jobs 50 --per-job 4 --max-passes 1 --sleep 0.1 --workers 4

      - name: Ensure phased daily accepted picks
        if: env.SKIP_INSIGHT != '1'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: >-
          python3 scripts/ensure_daily_minimum.py
          --target "$DAILY_TARGET"
          --per-job 10
          --max-passes 3
          --workers 10
          --agent-queries "$AGENT_QUERIES"
          --agent-pages "$AGENT_PAGES"
          --agent-screen-workers 6
          --curated-limit 90
          --shopify-pages 1

      - name: Enrich missing product images
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/enrich_images.py --limit 50

      - name: Score products
        if: env.SKIP_INSIGHT != '1'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python3 scripts/score.py --limit "$SCORE_LIMIT"

      - name: Generate trend report
        if: env.SKIP_INSIGHT != '1'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python3 scripts/trend_agent.py --limit 100

      - name: Build static insight dashboard
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/build_site.py

      - name: Generate weekly 100-pick report
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/weekly_report.py --limit 100

      - name: Rebuild dashboard with weekly report
        if: env.SKIP_INSIGHT != '1'
        run: python3 scripts/build_site.py

      - name: Commit data and dashboard
        if: env.SKIP_INSIGHT != '1'
        run: |
          git config user.name "design-insight-bot"
          git config user.email "bot@design-digest.com"
          git add index.html data/raw/ data/reports/ data/search_jobs.json data/products.json data/dedupe_index.json data/seen_fingerprints.json data/category_review.json data/rejected_category.json data/published.json data/trends.json data/weekly_report.json insight/
          if ! git diff --staged --quiet; then
            git commit -m "Update insight pool $(date +%Y-%m-%d)"
            git pull --rebase -X theirs origin main
            git push
          else
            echo "No insight pool changes"
          fi
