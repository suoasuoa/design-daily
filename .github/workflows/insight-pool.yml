name: Insight Pool

on:
  schedule:
    # Daily at 09:20 Beijing time.
    - cron: "20 1 * * *"
    # Backup run at 14:20 Beijing time in case GitHub drops/delays the first scheduled run.
    - cron: "20 6 * * *"
  workflow_dispatch:
    inputs:
      score_limit:
        description: "Maximum products to score this run"
        required: true
        default: "200"
      search_jobs:
        description: "Open-web search jobs to run"
        required: true
        default: "40"

permissions:
  contents: write

jobs:
  build-insight-pool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect public leads
        run: python3 scripts/collect_public.py

      - name: Generate search job matrix
        run: python3 scripts/search_jobs.py

      - name: Collect open-web search leads
        run: python3 scripts/collect_search.py --limit-jobs "${{ github.event.inputs.search_jobs || '40' }}" --per-job 4 --sleep 1.2

      - name: Dedupe product pool
        run: python3 scripts/dedupe.py

      - name: Review category fit
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/review_categories.py --batch-size 20

      - name: Enrich missing product images
        run: python3 scripts/enrich_images.py --limit 80

      - name: Score products
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/score.py --limit "${{ github.event.inputs.score_limit || '200' }}"

      - name: Generate trend report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/trend_agent.py --limit 100

      - name: Build static insight dashboard
        run: python3 scripts/build_site.py

      - name: Generate weekly 100-pick report
        run: python3 scripts/weekly_report.py --limit 100

      - name: Rebuild dashboard with weekly report
        run: python3 scripts/build_site.py

      - name: Commit data and dashboard
        run: |
          git config user.name "design-insight-bot"
          git config user.email "bot@design-digest.com"
          git add index.html data/raw/ data/reports/ data/search_jobs.json data/products.json data/dedupe_index.json data/category_review.json data/rejected_category.json data/published.json data/trends.json data/weekly_report.json insight/
          if ! git diff --staged --quiet; then
            git commit -m "Update insight pool $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No insight pool changes"
          fi
