name: Insight Pool

on:
  schedule:
    # 08:30, 13:30, and 17:30 Beijing time.
    - cron: "30 0 * * *"
    - cron: "30 5 * * *"
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      score_limit:
        description: "Maximum products to score this run"
        required: true
        default: "45"
      search_jobs:
        description: "Open-web search jobs to run"
        required: true
        default: "120"
      use_tavily:
        description: "Use Tavily credits for this manual deep run"
        required: true
        default: "false"

permissions:
  contents: write

concurrency:
  group: insight-pool-main
  cancel-in-progress: false

jobs:
  build-insight-pool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set phased daily targets
        run: |
          case "${{ github.event.schedule }}" in
            "30 0 * * *")
              echo "DAILY_TARGET=10" >> "$GITHUB_ENV"
              echo "SOCIAL_TARGET=0" >> "$GITHUB_ENV"
              echo "SEARCH_JOBS=60" >> "$GITHUB_ENV"
              echo "SCORE_LIMIT=60" >> "$GITHUB_ENV"
              echo "USE_TAVILY_SEARCH=0" >> "$GITHUB_ENV"
              ;;
            "30 5 * * *")
              echo "DAILY_TARGET=20" >> "$GITHUB_ENV"
              echo "SOCIAL_TARGET=0" >> "$GITHUB_ENV"
              echo "SEARCH_JOBS=80" >> "$GITHUB_ENV"
              echo "SCORE_LIMIT=80" >> "$GITHUB_ENV"
              echo "USE_TAVILY_SEARCH=0" >> "$GITHUB_ENV"
              ;;
            *)
              echo "DAILY_TARGET=30" >> "$GITHUB_ENV"
              echo "SOCIAL_TARGET=0" >> "$GITHUB_ENV"
              echo "SEARCH_JOBS=${{ github.event.inputs.search_jobs || '120' }}" >> "$GITHUB_ENV"
              echo "SCORE_LIMIT=${{ github.event.inputs.score_limit || '45' }}" >> "$GITHUB_ENV"
              if [ "${{ github.event.inputs.use_tavily || 'false' }}" = "true" ]; then
                echo "USE_TAVILY_SEARCH=1" >> "$GITHUB_ENV"
              else
                echo "USE_TAVILY_SEARCH=0" >> "$GITHUB_ENV"
              fi
              ;;
          esac

      - name: Collect public leads
        run: python3 scripts/collect_public.py

      - name: Collect curated product pages
        run: python3 scripts/collect_curated_pages.py --limit 120

      - name: Generate search job matrix
        run: python3 scripts/search_jobs.py

      - name: Install free search backend
        run: python3 -m pip install -q ddgs

      - name: Collect open-web search leads
        timeout-minutes: 60
        env:
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python3 scripts/collect_search.py --limit-jobs "$SEARCH_JOBS" --per-job 4 --sleep 0.1 --workers 4

      - name: Dedupe product pool
        run: python3 scripts/dedupe.py

      - name: Review category fit
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/review_categories.py --batch-size 20

      - name: Ensure phased public social picks
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python3 scripts/ensure_daily_social_minimum.py --target "$SOCIAL_TARGET" --batch-jobs 50 --per-job 4 --max-passes 1 --sleep 0.1 --workers 4

      - name: Ensure phased daily accepted picks
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python3 scripts/ensure_daily_minimum.py --target "$DAILY_TARGET" --batch-jobs 80 --per-job 4 --max-passes 1 --sleep 0.1 --workers 4

      - name: Enrich missing product images
        run: python3 scripts/enrich_images.py --limit 50

      - name: Score products
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/score.py --limit "$SCORE_LIMIT"

      - name: Generate trend report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/trend_agent.py --limit 100

      - name: Build static insight dashboard
        run: python3 scripts/build_site.py

      - name: Generate weekly 100-pick report
        run: python3 scripts/weekly_report.py --limit 100

      - name: Rebuild dashboard with weekly report
        run: python3 scripts/build_site.py

      - name: Commit data and dashboard
        run: |
          git config user.name "design-insight-bot"
          git config user.email "bot@design-digest.com"
          git add index.html data/raw/ data/reports/ data/search_jobs.json data/products.json data/dedupe_index.json data/seen_fingerprints.json data/category_review.json data/rejected_category.json data/published.json data/trends.json data/weekly_report.json insight/
          if ! git diff --staged --quiet; then
            git commit -m "Update insight pool $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No insight pool changes"
          fi
