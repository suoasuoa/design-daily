name: Feishu Daily Push

on:
  schedule:
    # Try several times in the 18:25-18:45 Beijing send window.
    - cron: "25 10 * * *"
    - cron: "30 10 * * *"
    - cron: "35 10 * * *"
    - cron: "40 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: feishu-daily-push-main
  cancel-in-progress: false

jobs:
  push-feishu-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Push daily Top 5 to Feishu group
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: python3 scripts/push_feishu_daily.py --limit 30 --top-limit 5 --min-count 30 --require-today --window-start 18:25 --window-end 18:45 --sent-log data/feishu_push_log.json --format card --no-images

      - name: Commit push log
        run: |
          git config user.name "design-insight-bot"
          git config user.email "bot@design-digest.com"
          if [ ! -f data/feishu_push_log.json ]; then
            echo "No Feishu push log file"
            exit 0
          fi
          git add data/feishu_push_log.json
          if ! git diff --staged --quiet; then
            git commit -m "Update Feishu push log $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No Feishu push log changes"
          fi
