name: Feishu Daily Push

on:
  workflow_run:
    workflows: ["Insight Pool"]
    types: [completed]
  schedule:
    # Keep retrying on Beijing weekdays so GitHub schedule drift does not skip the push.
    # The 18:00 Beijing run ("0 10 * * 1-5") acts as a hard backstop:
    # if today's digest has not been sent yet, it bypasses the time window and sends once.
    - cron: "0 9 * * 1-5"
    - cron: "10 9 * * 1-5"
    - cron: "20 9 * * 1-5"
    - cron: "30 9 * * 1-5"
    - cron: "40 9 * * 1-5"
    - cron: "50 9 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "10 10 * * 1-5"
    - cron: "20 10 * * 1-5"
    - cron: "30 10 * * 1-5"
    - cron: "40 10 * * 1-5"
    - cron: "50 10 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "10 11 * * 1-5"
    - cron: "20 11 * * 1-5"
    - cron: "30 11 * * 1-5"
    - cron: "40 11 * * 1-5"
    - cron: "50 11 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "10 12 * * 1-5"
    - cron: "20 12 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "40 12 * * 1-5"
    - cron: "50 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "10 13 * * 1-5"
    - cron: "20 13 * * 1-5"
    - cron: "30 13 * * 1-5"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Bypass time window for manual recovery"
        required: false
        default: "false"


permissions:
  contents: write

concurrency:
  group: feishu-daily-push-main
  cancel-in-progress: false

jobs:
  push-feishu-daily:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Push daily Top 5 to Feishu group
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: |
          WINDOW_ARGS="--window-start 17:00 --window-end 23:30"
          MIN_COUNT="40"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 10 * * 1-5" ]; then
            WINDOW_ARGS="--window-start 00:00 --window-end 23:59"
            MIN_COUNT="40"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_send || 'false' }}" = "true" ]; then
            WINDOW_ARGS="--window-start 00:00 --window-end 23:59"
            MIN_COUNT="1"
          fi
          python3 scripts/push_feishu_daily.py --limit 40 --top-limit 5 --min-count "$MIN_COUNT" --require-today $WINDOW_ARGS --sent-log data/feishu_push_log.json --format card --no-images

      - name: Commit push log
        run: |
          git config user.name "design-insight-bot"
          git config user.email "bot@design-digest.com"
          if [ ! -f data/feishu_push_log.json ]; then
            echo "No Feishu push log file"
            exit 0
          fi
          git add data/feishu_push_log.json
          if ! git diff --staged --quiet; then
            git commit -m "Update Feishu push log $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No Feishu push log changes"
          fi
