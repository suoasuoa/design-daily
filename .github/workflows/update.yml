name: Daily Design Digest

on:
  schedule:
    # 每天3次: UTC 0/8/16 = CST 08:00/16:00/00:00(次日)
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '展示模式: all=全部展示(默认) / daily=每日精选'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - daily
      deepseek:
        description: 'DeepSeek 精细化评分 (默认开启)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  accumulate-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps
        shell: bash

      - name: Accumulate new data (with DeepSeek scoring)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "📥 Accumulating new data from RSS + G-Mark API..."
          if [[ "${{ github.event.inputs.deepseek }}" == "false" ]]; then
            python3 accumulate.py
          else
            python3 accumulate.py --deepseek
          fi
          echo "✅ Accumulation complete"

      - name: Generate data
        run: |
          # schedule可手動觸發默認值不同，所以統一判斷
          if [[ "${{ github.event.inputs.mode || 'all' }}" == "daily" ]]; then
            python3 generate.py --daily
          else
            python3 generate.py
          fi

      - name: Commit and push
        run: |
          git config user.name "design-digest-bot"
          git config user.email "bot@design-digest.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add brand_pool.json data.js data/latest.json data/
          # 也可能有 deepseek_scorer.py 变更
          git add deepseek_scorer.py
          if ! git diff --staged --quiet; then
            git commit -m "📊 数据自动积累 $(date +%Y-%m-%dT%H:%M)"
            git push
          else
            echo "数据无变化，跳过提交"
          fi
