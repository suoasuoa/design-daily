name: 🎨 Design Digest 每日更新
on:
  schedule:
    # 每天 00:00 UTC = 08:00 CST 生成数据
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 生成每日精选数据
        run: python3 generate.py

      - name: 提交并推送更新
        run: |
          git config user.name "design-digest-bot"
          git config user.email "bot@design-digest"
          git add data/latest.json data.js
          git diff --cached --quiet || git commit -m "🔄 设计灵感数据更新 $(date +'%Y-%m-%d')"
          git push
