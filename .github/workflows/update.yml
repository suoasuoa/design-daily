name: 🎨 Design Digest 每日更新
on:
  schedule:
    # 每天 00:00 UTC = 08:00 CST 跑一次，每2天提交一次数据更新
    - cron: '0 0 */2 * *'    # 每2天 08:00 CST 更新一次
  workflow_dispatch:          # 手动触发键

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 生成每日设计灵感数据（含实时爬取）
        run: python3 generate.py

      - name: 检查是否有变化
        id: check
        run: |
          git diff --quiet data/latest.json data.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 提交并推送更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "design-digest-bot"
          git config user.email "bot@design-digest"
          git add data/latest.json data.js
          git commit -m "🔄 设计灵感数据更新 $(date +'%Y-%m-%d %H:%M')"
          git push
