name: Daily Design Digest

on:
  schedule:
    # 每天北京时间 08:00 UTC+8 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '生成模式: daily=每日抽取(默认) / all=全部展示'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - all

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        run: |
          if [[ "${{ github.event.inputs.mode }}" == "all" ]]; then
            python3 generate.py
          else
            python3 generate.py --daily
          fi

      - name: Commit and push
        run: |
          git config user.name "design-digest-bot"
          git config user.email "bot@design-digest.com"
          # 用 GITHUB_TOKEN 进行认证
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data.js data/latest.json data/
          if ! git diff --staged --quiet; then
            git commit -m "📊 每日数据更新 $(date +%Y-%m-%d)"
            git push
          else
            echo "数据无变化，跳过提交"
          fi
